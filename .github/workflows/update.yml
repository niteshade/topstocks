name: Update Stock Data

on:
  schedule:
    # Runs at 8:01 PM UTC = 4:01 PM ET (1 min after market close); EDT = UTC-4
    - cron: "1 20 * * 1-5"
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "yfinance>=0.2.54,<0.3"

      - name: Fetch stock data
        run: python scripts/fetch_stocks.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          git diff --staged --quiet || git commit -m "chore: update stock data $(date -u '+%Y-%m-%d')"
          git push
